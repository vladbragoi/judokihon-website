name: Deploy Test (env/test)

on:
  push:
    branches:
      - env/test
  schedule:
    - cron: '0 2 1 6 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy Test to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa dipendenze
        run: npm ci

      - name: Installa LibreOffice e font MS per generazione PDF
        run: |
          sudo apt-get update
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install -y libreoffice ttf-mscorefonts-installer fonts-crosextra-carlito fonts-crosextra-caladea --no-install-recommends

      - name: Compila il sito
        run: npm run build
        env:
          VITE_BASE_URL: /

      - name: Aggiungi fallback 404 per SPA (React Router)
        run: cp ./dist/index.html ./dist/404.html

      - name: Pubblica su GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: test.judokihon.it
