name: Deploy Prod (master)

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy Prod via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa dipendenze
        run: npm ci

      - name: Compila il sito
        run: npm run build
        env:
          VITE_BASE_URL: /

      - name: Pubblica su Aruba via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./judokihon.it/
          protocol: ftp
          state-name: sync-state.json
          log-level: verbose
