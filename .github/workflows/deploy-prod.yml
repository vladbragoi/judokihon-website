name: Deploy Prod (main)

on:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: '0 2 1 6 *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Prod via GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa dipendenze
        run: npm ci

      - name: Installa LibreOffice e font MS per generazione PDF
        run: |
          sudo apt-get update
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install -y libreoffice ttf-mscorefonts-installer fonts-crosextra-carlito fonts-crosextra-caladea --no-install-recommends

      - name: Compila il sito
        run: npm run build
        env:
          VITE_BASE_URL: /

      - name: Aggiungi fallback 404 per SPA (React Router)
        run: cp ./dist/index.html ./dist/404.html

      - name: Pubblica su GitHub Pages (Repo Produzione)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PROD_DEPLOY_TOKEN }}
          external_repository: vladbragoi/judokihon-production
          publish_branch: gh-pages
          publish_dir: ./dist
          cname: www.judokihon.it

      - name: Crea un nuovo Tag Automatico
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

